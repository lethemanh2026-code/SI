1. Who is responsible for providing material and spare part for aircraft maintenance? (AUD; A; B; C; QM; SI; MAP; WS; NDT; INV; MP; CMP; CE; PP; EE)

*b. Must pass the incoming inspection by VAECO store inspector prior to use for maintenance on customer A/C.

a. Premeditated or intentional acts of damage to equipment or property.

*c. All of these answers are correct.
 Ref.: SOP 10.18.5.2

a. A human action (or human behavior) that unintentionally deviates from the expected action (or behavior).

b. A human action (or human behavior) could result in a failure, malfunction, or defect which would endanger the continued safe flight and landing of the aircraft.

        const generateRationale = (ref) => {
            if(!ref) return "Không có trích dẫn cụ thể. Áp dụng các nguyên tắc cơ bản trong hàng không.";

            return "Theo quy định được nêu rõ trong " + ref;
        };

        const parseBank1 = (rawText) => {
            const qs = [];
            const blocks = rawText.split(/\n(?=\d+\.\s)/);
            for (let block of blocks) {
                block = block.replace(/\[Page \d+\]/g, '').trim();
                if (!block) continue;
                
                const lines = block.split('\n');
                let curQ = { id: '', question: '', options: [], correct: 0, ref: '', rationale: '' };
                let isOpt = false;
                
                for (let line of lines) {
                    line = line.trim();
                    if(!line) continue;
                    
                    if (line.match(/^(\d+)\.\s+/)) {
                        curQ.id = line.match(/^(\d+)/)[1];
                        curQ.question = line.replace(/^\d+\.\s+/, '');
                    } else if (line.match(/^\*[a-e]\.\s/i)) {
                        isOpt = true;
                        curQ.correct = curQ.options.length;
                        curQ.options.push(line.replace(/^\*[a-e]\.\s/i, '').trim());
                    } else if (line.match(/^[a-e]\.\s/i)) {
                        isOpt = true;
                        curQ.options.push(line.replace(/^[a-e]\.\s/i, '').trim());
                    } else if (line.startsWith('Ref.:') || line.startsWith('Ref:')) {
                        curQ.ref = line.replace(/^Ref\.:?\s*/i, '').trim();
                    } else {
                        if(isOpt) curQ.options[curQ.options.length-1] += ' ' + line;
                        else curQ.question += ' ' + line;
                    }
                }
                curQ.rationale = "Tham chiếu trực tiếp từ " + (curQ.ref || "Tài liệu VAECO SOP/MOE");
                if(curQ.options.length > 0) qs.push(curQ);
            }
            return qs;
        };

      const parseBank2 = (rawText) => {
        const qs = [];
        const blocks = rawText.split(/\n(?=\d+\.\s)/);
        
        blocks.forEach((block, index) => {
            block = block.replace(/\[Page \d+\]/g, '').trim();
            if (!block) return;
            
            const lines = block.split('\n');
            let curQ = { id: '', question: '', options: [], correct: bank2Answers[index] || 0, ref: '', rationale: '' };
            
            for (let line of lines) {
                line = line.trim();
                if(!line) continue;
                if (line.match(/^(\d+)\.\s+/)) {
                    curQ.id = "PDF-" + line.match(/^(\d+)/)[1];
                    curQ.question = line.replace(/^\d+\.\s+/, '');
                } else if (line.match(/^Reference:\s*/i)) {
                    curQ.ref = line.replace(/^Reference:\s*/i, '').trim();
                } else if (line.match(/^[a-eA-EсС]\.\s/)) {
                    curQ.options.push(line.replace(/^[a-eA-EсС]\.\s/, '').trim());
                }
            }
            if(curQ.options.length > 0) qs.push(curQ);
        });
        return qs;
    };

                                                </span>
                                            </div>
                                            
                                            <div className="space-y-2 mb-4">
                                                {q.options.map((opt, oIdx) => {
                                                    let bgClass = "bg-gray-900/50 border-gray-700 text-gray-400";
                                                    if (oIdx === q.correct) bgClass = "bg-emerald-900/30 border-emerald-500 text-emerald-200 font-medium";
                                                    else if (oIdx === userAns && !isCorrect) bgClass = "bg-red-900/30 border-red-500 text-red-200 line-through opacity-80";

                                                    return (
                                                        <div key={oIdx} className={`p-3 rounded-lg border ${bgClass}`}>
                                                            {String.fromCharCode(65 + oIdx)}. {opt}
                                                        </div>
                                                    )
                                                })}
                                            </div>

                                            <div className="mt-4 p-4 bg-gray-900/60 border-l-4 border-amber-500 rounded-r-lg">
                                                <div className="text-sm text-gray-300"><span className="font-bold text-amber-500 uppercase tracking-wider text-xs mr-2">💡 Giải thích:</span> {q.rationale}</div>
                                                {q.ref && <div className="mt-2 text-xs text-gray-500 font-mono">Ref: {q.ref}</div>}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        )}
                    </div>
                );
            }

            const q = activeQuestions[currentQ];
            
            return (
                <div className="max-w-6xl mx-auto mt-6 mb-12 p-4 fade-in">
                    <div className="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700 mb-6 shadow-sm">
                        <button onClick={backToMenu} className="text-gray-400 hover:text-gray-100 flex items-center font-medium transition text-sm px-2">
                            <span className="mr-2">←</span> Thoát
                        </button>
                        <div className="text-lg font-bold text-gray-200 hidden md:block">
                            {mode === 'PRACTICE' ? 'Chế độ Ôn tập' : 'Chế độ Thi thử'}
                        </div>
                        <div className="bg-gray-900 border border-gray-700 text-blue-400 text-sm font-bold px-4 py-1.5 rounded-lg tracking-widest">
                            {currentQ + 1} / {activeQuestions.length}
                        </div>
                    </div>

                    <div className="flex flex-col lg:flex-row gap-6">
                        {/* Khu vực Câu hỏi */}
                        <div className="flex-1 bg-gray-800 p-6 lg:p-8 rounded-2xl border border-gray-700 shadow-sm relative">
                            <h2 className="text-xl font-bold text-gray-100 mb-8 leading-relaxed">
                                <span className="text-blue-500 mr-2">Câu {currentQ + 1} <span className="text-sm font-normal text-gray-500 font-mono">({q.id})</span>.</span> 
                                {q.question}
                            </h2>
                            
                            <div className="space-y-4">
                                {q.options.map((opt, idx) => {
                                    let btnClass = "border-gray-600 bg-gray-900/50 hover:border-gray-400 text-gray-300";
                                    let badgeClass = "bg-gray-700 text-gray-300";
                                    
                                    if (mode === 'PRACTICE') {
                                        if (isAnswered) {
                                            if (idx === q.correct) {
                                                btnClass = "border-emerald-500 bg-emerald-900/20 text-emerald-100";
                                                badgeClass = "bg-emerald-500 text-white";
                                            } else if (idx === selectedOption) {
                                                btnClass = "border-red-500 bg-red-900/20 text-red-100";
                                                badgeClass = "bg-red-500 text-white";
                                            }
                                        }
                                    } else if (mode === 'EXAM') {
                                        if (examAnswers[currentQ] === idx) {
                                            btnClass = "border-blue-500 bg-blue-900/20 text-blue-100 ring-1 ring-blue-500";
                                            badgeClass = "bg-blue-500 text-white";
                                        }
                                    }

                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => handleAnswerSelect(idx)}
                                            disabled={mode === 'PRACTICE' && isAnswered}
                                            className={`w-full text-left p-4 rounded-xl border transition-all duration-200 ${btnClass} ${(!isAnswered || mode === 'EXAM') ? 'active:scale-[0.99]' : 'cursor-default'}`}
                                        >
                                            <div className="flex items-center">
                                                <span className={`w-8 h-8 shrink-0 flex items-center justify-center rounded-lg mr-4 text-sm font-bold transition-colors ${badgeClass}`}>
                                                    {String.fromCharCode(65 + idx)}
                                                </span>
                                                <span className="font-medium text-base leading-snug">{opt}</span>
                                            </div>
                                        </button>
                                    )
                                })}
                            </div>

                            {/* Giải thích (Chỉ cho Practice) */}
                            {mode === 'PRACTICE' && isAnswered && (
                                <div className="mt-8 p-5 bg-gray-900/80 rounded-xl border-l-4 border-amber-500 fade-in">
                                    <h3 className="text-xs font-bold text-amber-500 mb-2 uppercase tracking-wider">💡 Ghi chú & Giải thích:</h3>
                                    <p className="text-gray-300 text-sm mb-2 leading-relaxed">{q.rationale}</p>
                                    {q.ref && <p className="text-xs font-mono text-gray-500">Ref: {q.ref}</p>}
                                </div>
                            )}

                            {/* Điều hướng dưới Câu hỏi */}
                            <div className="mt-10 pt-6 border-t border-gray-700 flex justify-between items-center">
                                <button 
                                    onClick={() => setCurrentQ(Math.max(0, currentQ - 1))}
                                    disabled={currentQ === 0}
                                    className={`px-6 py-2.5 rounded-lg font-medium transition-all ${currentQ === 0 ? 'bg-gray-900 text-gray-600 cursor-not-allowed' : 'bg-gray-700 text-gray-200 hover:bg-gray-600'}`}
                                >
                                    Trở lại
                                </button>
                                
                                {mode === 'PRACTICE' ? (
                                    <div className="ml-auto w-full md:w-auto">
                                        {isAnswered && (
                                            <button 
                                                onClick={nextPracticeQuestion}
                                                className="w-full bg-blue-600 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-blue-500 transition-all shadow-lg"
                                            >
                                                {currentQ + 1 === activeQuestions.length ? "Xem kết quả" : "Câu tiếp theo →"}
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div className="ml-auto">
                                        {currentQ + 1 === activeQuestions.length ? (
                                            <button 
                                                onClick={submitExam}
                                                className="bg-emerald-600 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-emerald-500 transition-all shadow-lg"
                                            >
                                                Nộp bài thi
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={() => setCurrentQ(Math.min(activeQuestions.length - 1, currentQ + 1))}
                                                className="bg-blue-600 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-blue-500 transition-all shadow-lg"
                                            >
                                                Câu tiếp theo →
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Thanh điều hướng nhanh Panel phải */}
                        <div className="w-full lg:w-72 shrink-0 bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-sm h-fit max-h-[85vh] overflow-y-auto">
                            <h3 className="font-bold text-gray-300 mb-4 text-center text-sm uppercase tracking-widest">Danh sách câu hỏi</h3>
                            <div className="grid grid-cols-5 gap-2">
                                {activeQuestions.map((_, idx) => {
                                    const isCurrent = currentQ === idx;
                                    let btnStatusClass = "bg-gray-900 border-gray-700 text-gray-400 hover:bg-gray-700 hover:text-gray-200";
                                    // CHÈN LOGIC MÀU ĐỎ:
                                    if (wrongAnswers.includes(idx)) {
                                        btnStatusClass = "bg-red-900/50 border-red-500 text-red-300";
                                    } else if (mode === 'EXAM') {
                                        if (examAnswers[idx] !== undefined) btnStatusClass = "bg-blue-900/50 border-blue-500/50 text-blue-300";
                                    } else {
                                        if (idx < currentQ || (idx === currentQ && isAnswered)) btnStatusClass = "bg-emerald-900/50 border-emerald-500/50 text-emerald-300";
                                    }

                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => {
                                                if(mode==='PRACTICE') {
                                                    setCurrentQ(idx);
                                                    setIsAnswered(true); 
                                                    if(idx >= currentQ && !isAnswered) setIsAnswered(false); 
                                                } else {
                                                    setCurrentQ(idx);
                                                }
                                            }}
                                            className={`h-10 rounded-lg border text-sm font-semibold transition-all flex items-center justify-center ${
                                                isCurrent ? 'ring-2 ring-white ring-offset-2 ring-offset-gray-800' : ''
                                            } ${btnStatusClass}`}
                                        >
                                            {idx + 1}
                                        </button>
                                    )
                                })}
                                
                            </div>
                        </div>
                    </div>
                    {wrongAnswers.length > 0 && (
            <button onClick={() => {
                setActiveQuestions(activeQuestions.filter((_, idx) => wrongAnswers.includes(idx)));
                setCurrentQ(0);
                setMode('PRACTICE');
                setWrongAnswers([]); // Reset danh sách sai sau khi ôn lại
            }} className="mt-4 bg-red-700 hover:bg-red-600 text-white px-6 py-3 rounded-lg font-bold">
                Xem lại {wrongAnswers.length} câu sai
            </button>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
